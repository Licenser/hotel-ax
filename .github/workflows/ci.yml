name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test with Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: |
          pytest --cov=custom_components/hotel_ax --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black isort mypy

      - name: Run ruff
        run: |
          ruff check custom_components/ tests/
        continue-on-error: true

      - name: Check formatting with black
        run: |
          black --check custom_components/ tests/
        continue-on-error: true

      - name: Check import sorting with isort
        run: |
          isort --check-only custom_components/ tests/
        continue-on-error: true

  validate:
    name: Validate for HACS
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate HACS manifest
        run: |
          if [ ! -f hacs.json ]; then
            echo "Missing hacs.json"
            exit 1
          fi
          echo "hacs.json exists"

      - name: Validate manifest.json
        run: |
          if [ ! -f custom_components/hotel_ax/manifest.json ]; then
            echo "Missing manifest.json"
            exit 1
          fi
          echo "manifest.json exists"

      - name: Check for required files
        run: |
          required_files=(
            "README.md"
            "custom_components/hotel_ax/__init__.py"
            "custom_components/hotel_ax/manifest.json"
            "custom_components/hotel_ax/strings.json"
          )
          for file in "${required_files[@]}"; do
            if [ ! -f "$file" ]; then
              echo "Missing required file: $file"
              exit 1
            fi
          done
          echo "All required files present"
